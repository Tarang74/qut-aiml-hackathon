<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Farmers</title>
    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
        min-height: 100%;
      }
      body {
        background: #f5f3ef;
        color: #18181a;
        font-family: monospace;
        -webkit-text-size-adjust: 100%;
      }
      button, input, select, textarea {
        font-family: inherit;
        box-sizing: border-box;
        max-width: 100%;
      }
      img, svg {
        max-width: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
