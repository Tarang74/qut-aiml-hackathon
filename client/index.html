<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Farmers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
        min-height: 100%;
        /* Force light scheme so native controls (inputs, selects) stay light */
        color-scheme: light;
      }
      body {
        background: #f5f3ef;
        color: #18181a;
        font-family: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        /* Scale with viewport: ~20px at 1366px, ~26px at 1920px, ~36px at 2560px */
        font-size: clamp(18px, 1.4vw, 38px);
        line-height: 1.5;
        -webkit-text-size-adjust: 100%;
      }
      button, input, select, textarea {
        font-family: inherit;
        box-sizing: border-box;
        max-width: 100%;
        /* Reset dark-mode native styling */
        background: #ffffff;
        color: #18181a;
      }
      button {
        background: revert;
      }
      img, svg {
        max-width: 100%;
        display: block;
      }
      /* Prevent horizontal scroll from any child */
      * {
        min-width: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
